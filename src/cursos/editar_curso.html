<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profplan</title>
    <link rel="stylesheet" type="text/css" href="../shared/cores.css">
    <link rel="stylesheet" type="text/css" href="./style_gerenciar_curso.css"/>
    <link rel="stylesheet" type="text/css" href="../shared/padrao.css"/>
    <script src="../shared/header.js"></script>
    <script src="./header_config.js"></script>
</head>
<body>
    <div id="notificacao" class="notificacao oculto"></div>
    <div class="corpo">
        <p>Escolher corretamente as áreas proficientes em cada UC influencia as sugestões de arranjos e melhora o uso do sistema.</p>
        <div class="corpo-frame">
                <form id="editar-curso">
                    <div class="juntar">
                        <input type="hidden" id="id" name="id"/>
                        <section class="textos">
                            <label for="nome">Nome</label>
                            <input type="text" id="nome" name="nome" placeholder="Digite aqui o nome do curso" required />
                        </section>
                        <section class="textos">
                            <label for="codigo">Código da matriz</label>
                            <input type="text" id="codigo" name="codigo" placeholder="Digite a matriz" required/>
                        </section>
                        <section class="textos">
                            <label for="externo">Alocação externa</label>
                            <input type="checkbox" id="externo" name="externo"/>
                        </section>
                    </div>
                    <div class="juntar">
                        <section class="textos">
                            <label for="carga">Carga horária CH</label>
                            <input type="text" id="carga" name="carga" placeholder="Digite aqui a CH" required/>
                        </section>
                        <section class="checklist">    
                            <div class="select-habilitacao">
                                <label for="habilitacao">Habilitação</label><br>
                                <select id="habilitacao" name="habilitacao">                                
                                    <option value="Iniciação">Iniciação</option>
                                    <option value="Qualificação">Qualificação</option>
                                    <option value="Aprendizagem">Aprendizagem</option>
                                    <option value="Aperfeiçoamento/Especialização">Aperfeiçoamento/Especialização</option>
                                    <option value="Técnica">Técnica</option>
                                    <option value="Graduação">Graduação</option>
                                    <option value="Extensão">Extensão</option>
                                </select>
                            </div>
                        </section>
                        <section class="checklist">
                            <div class="select-area">
                                <label for="area">Área</label><br>
                                <select id="area" name="area"> 
                                    <option value="Alimentos">Alimentos</option>  
                                    <option value="Automotiva">Automotiva</option>
                                    <option value="Automação Industrial">Automação Industrial</option>
                                    <option value="Construção Civil">Construção Civil</option>
                                    <option value="Eletroeletrônica">Eletroeletrônica</option>
                                    <option value="Gestão">Gestão</option>       
                                    <option value="Metalmecânica">Metalmecânica</option>  
                                    <option value="Segurança do Trabalho">Segurança do Trabalho</option>                                            
                                    <option value="Tecnologia da Informação">Tecnologia da Informação</option>                                    
                                    <option value="Vestuário">Vestuário</option>
                                </select>
                            </div>
                        </section>
                    </div>
                    <div class="juntar">
                        <p>Unidades Curriculares</p>
                    </div>
                    <section> 
                        <div class="list-uc">
                            <table id="table-ucs">
                                <thead class="cabecalho">
                                    <tr class="infos">
                                        <th>Nome</th>
                                        <th>Horas-aula</th>
                                        <th>Módulo</th>
                                        <th>Áreas com proficiência</th>
                                        <th>Ações</th>
                                    </tr>
                                </thead>
                                <tbody>
                                </tbody>
                            </table>
                        </div>
                    </section>    
                    <div class="uc-list">
                        <section class="select-ucs">
                            <div>
                                <label for="nome-uc">Nome</label><br>
                                <input id="nome-uc" name="nome-uc" type="text"/>
                            </div>
                            <div>
                                <label for="horas-aula">Horas-aula</label><br>
                                <input type="number" id="horas-aula" name="horas-aula"/>
                            </div>
                            <div>
                                <label for="modulo">Módulo</label><br>
                                <input type="number" id="modulo" name="modulo"/>
                            </div>
                            <div class="area-prof">
                                <div class="checkbox-group">
                                    <label for="area-prof">Área com proficiência</label>
                                    <select name="area-prof" id="area-prof" class="area-prof" multiple>
                                        <option value="Alimentos">Alimentos</option>  
                                        <option value="Automotiva">Automotiva</option>
                                        <option value="Construção Civil">Construção Civil</option>
                                        <option value="Eletroeletrônica">Eletroeletrônica</option>
                                        <option value="Gestão">Gestão</option>
                                        <option value="Madeira e Mobiliária">Madeira e Mobiliária</option>
                                        <option value="Metalmecânica">Metalmecânica</option>
                                        <option value="Segurança do Trabalho">Segurança do Trabalho</option>
                                        <option value="Tecnologia da Informação">Tecnologia da Informação</option>
                                        <option value="Vestuário">Vestuário</option>
                                    </select>
                                </div>
                            </div>
                            <button type="button" id="addUC">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path fill-rule="evenodd" clip-rule="evenodd" d="M12 3.75C7.44365 3.75 3.75 7.44365 3.75 12C3.75 16.5563 7.44365 20.25 12 20.25C16.5563 20.25 20.25 16.5563 20.25 12C20.25 7.44365 16.5563 3.75 12 3.75ZM2.25 12C2.25 6.61522 6.61522 2.25 12 2.25C17.3848 2.25 21.75 6.61522 21.75 12C21.75 17.3848 17.3848 21.75 12 21.75C6.61522 21.75 2.25 17.3848 2.25 12Z" fill="var(--cor-primaria)"/>
                                    <path fill-rule="evenodd" clip-rule="evenodd" d="M7.5 12C7.5 11.5858 7.83579 11.25 8.25 11.25H15.75C16.1642 11.25 16.5 11.5858 16.5 12C16.5 12.4142 16.1642 12.75 15.75 12.75H8.25C7.83579 12.75 7.5 12.4142 7.5 12Z" fill="var(--cor-primaria)"/>
                                    <path fill-rule="evenodd" clip-rule="evenodd" d="M12 7.5C12.4142 7.5 12.75 7.83579 12.75 8.25V15.75C12.75 16.1642 12.4142 16.5 12 16.5C11.5858 16.5 11.25 16.1642 11.25 15.75V8.25C11.25 7.83579 11.5858 7.5 12 7.5Z" fill="var(--cor-primaria)"/>
                                </svg>
                            </button>
                        </section>
                        <section>
                            <p>Opções rápidas:</p>
                            <div class="juntar add">
                                <button type="button" id="addBasico">
                                    Adicionar básico da indústria
                                </button>
                                <button type="button" id="addBasicoSeed">
                                    Adicionar básico da indústria SEED
                                </button>
                            </div>
                        </section>
                    </div>
                    <div class="juntar">
                    <button class="botoes" id="voltar"><a href="/cursos"><svg width="25" height="24" viewBox="0 0 25 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M12.5 3C7.52944 3 3.5 7.02944 3.5 12C3.5 16.9706 7.52944 21 12.5 21C17.4706 21 21.5 16.9706 21.5 12C21.5 7.02944 17.4706 3 12.5 3ZM1.5 12C1.5 5.92487 6.42487 1 12.5 1C18.5751 1 23.5 5.92487 23.5 12C23.5 18.0751 18.5751 23 12.5 23C6.42487 23 1.5 18.0751 1.5 12Z" fill="white"/>
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M13.2071 7.29289C13.5976 7.68342 13.5976 8.31658 13.2071 8.70711L9.91421 12L13.2071 15.2929C13.5976 15.6834 13.5976 16.3166 13.2071 16.7071C12.8166 17.0976 12.1834 17.0976 11.7929 16.7071L7.79289 12.7071C7.40237 12.3166 7.40237 11.6834 7.79289 11.2929L11.7929 7.29289C12.1834 6.90237 12.8166 6.90237 13.2071 7.29289Z" fill="white"/>
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M7.5 12C7.5 11.4477 7.94772 11 8.5 11H16.5C17.0523 11 17.5 11.4477 17.5 12C17.5 12.5523 17.0523 13 16.5 13H8.5C7.94772 13 7.5 12.5523 7.5 12Z" fill="white"/>
                            </svg>Voltar</a>                     
                        </button>
                        <button class="botoes" id="excluir" type="submit">Excluir curso
                            <svg width="25" height="24" viewBox="0 0 25 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path fill-rule="evenodd" clip-rule="evenodd" d="M3.5 5.25C3.5 4.83579 3.83579 4.5 4.25 4.5H20.75C21.1642 4.5 21.5 4.83579 21.5 5.25C21.5 5.66421 21.1642 6 20.75 6H4.25C3.83579 6 3.5 5.66421 3.5 5.25Z" fill="currentColor"/>

                            </svg>                   
                        </button>
                        <button class="botoes" id="editar" type="submit">Salvar edição
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path fill-rule="evenodd" clip-rule="evenodd" d="M16.6677 9.2323C16.9536 9.532 16.9424 10.0067 16.6427 10.2927L11.1396 15.5427C10.8496 15.8193 10.3934 15.8191 10.1037 15.5422L7.35684 12.9172C7.05738 12.631 7.0466 12.1563 7.33278 11.8568C7.61895 11.5574 8.0937 11.5466 8.39317 11.8328L10.6223 13.963L15.6073 9.20734C15.907 8.92142 16.3817 8.93259 16.6677 9.2323Z" fill="currentColor"/>

                            </svg>                  
                        </button>
                    </div>
                </form>
            </div>
    </div>
    <script>
    window.onload = function() {
        const cursoData = JSON.parse(localStorage.getItem('cursoData'));
        if (cursoData) {
            document.getElementById('id').value=cursoData[0]._id;
            document.getElementById('nome').value = cursoData[0].nome;
            document.getElementById('codigo').value = cursoData[0].codigo;
            document.getElementById('externo').checked = cursoData[0].externo;
            document.getElementById('carga').value = cursoData[0].carga;
            document.getElementById('habilitacao').value = cursoData[0].habilitacao;
            document.getElementById('area').value = cursoData[0].area;
            if(cursoData[0].externo){
                document.getElementById('codigo').setAttribute('disabled','disabled');
            }
            if (Array.isArray(cursoData[0].ucs)) {
                const tabela = document.querySelector("#table-ucs tbody");
                cursoData[0].ucs.forEach(uc => {
                    const registro = tabela.insertRow();
                    registro.classList.add("uc");
                    const registroNome = registro.insertCell();
                    const registroHorasAula = registro.insertCell();
                    const registroModulo = registro.insertCell();
                    const registroArea = registro.insertCell();
                    const registroAcao = registro.insertCell();
                    registroNome.textContent = uc.nome;
                    registroHorasAula.textContent = uc.horasAula;
                    registroModulo.textContent = uc.modulo;
                    
                    registroArea.innerHTML=uc.areaProf;
                    registroArea.classList.add("area-esquerda");
                    registroNome.classList.add("area-esquerda");
                    const botaoRemover = document.createElement("button");
                    botaoRemover.textContent = "Remover";
                    botaoRemover.onclick = function () {
                        registro.remove();
                    };
                    registroAcao.appendChild(botaoRemover);
                    registroAcao.classList.add("remove");
                            });

            }
        } else {
            console.error('Dados do curso não encontrados no localStorage');
            alert('Dados não encontrados.');
        }
    }
    </script>
    <script src="../shared/registroLogs.js"></script>
    <script src="./script_ucs.js"></script>
    <script src="./script_gerenciar_curso.js"></script>   
</body>
</html>
