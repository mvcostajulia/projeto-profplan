<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profplan</title>
    <link rel="stylesheet" type="text/css" href="../shared/cores.css">
    <link rel="stylesheet" type="text/css" href="./style_gerenciar_curso.css"/>
    <link rel="stylesheet" type="text/css" href="../shared/padrao.css"/>
    <script src="../shared/header.js"></script>
    <script src="./header_config.js"></script>
</head>
<body>
    <div id="notificacao" class="notificacao oculto"></div>
    <div class="corpo">
        <p>Escolher corretamente as áreas proficientes em cada UC influencia as sugestões de arranjos e melhora o uso do sistema.</p>
        <div class="corpo-frame">
                <form id="editar-curso">
                    <div class="juntar">
                        <input type="hidden" id="id" name="id"/>
                        <section class="textos">
                            <label for="nome">Nome</label>
                            <input type="text" id="nome" name="nome" placeholder="Digite aqui o nome do curso" required readonly />
                        </section>
                        <section class="textos">
                            <label for="codigo">Código da matriz</label>
                            <input type="text" id="codigo" name="codigo" placeholder="Digite a matriz" required readonly/>
                        </section>
                        <section class="textos">
                            <label for="externo">Alocação externa</label>
                            <input type="checkbox" id="externo" name="externo"/>
                        </section>
                    </div>
                    <div class="juntar">
                        <section class="textos">
                            <label for="carga">Carga horária CH</label>
                            <input type="text" id="carga" name="carga" placeholder="Digite aqui a CH" required readonly/>
                        </section>
                        <section class="checklist">    
                            <div class="select-habilitacao">
                                <label for="habilitacao">Habilitação</label><br>
                                <select id="habilitacao" name="habilitacao" disabled>                                
                                    <option value="Iniciação">Iniciação</option>
                                    <option value="Qualificação">Qualificação</option>
                                    <option value="Aprendizagem">Aprendizagem</option>
                                    <option value="Aperfeiçoamento/Especialização">Aperfeiçoamento/Especialização</option>
                                    <option value="Técnica">Técnica</option>
                                    <option value="Graduação">Graduação</option>
                                    <option value="Extensão">Extensão</option>
                                </select>
                            </div>
                        </section>
                        <section class="checklist">
                            <div class="select-area">
                                <label for="area">Área</label><br>
                                <select id="area" name="area" disabled>                                                           
                                    <option value="Alimentos">Alimentos</option>  
                                    <option value="Automotiva">Automotiva</option>
                                    <option value="Construção Civil">Construção Civil</option>
                                    <option value="Eletroeletrônica">Eletroeletrônica</option>
                                    <option value="Gestão">Gestão</option>
                                    <option value="Madeira e Mobiliária">Madeira e Mobiliária</option>
                                    <option value="Metalmecânica">Metalmecânica</option>
                                    <option value="Segurança do Trabalho">Segurança do Trabalho</option>
                                    <option value="Tecnologia da Informação">Tecnologia da Informação</option>
                                    <option value="Vestuário">Vestuário</option>
                                </select>
                            </div>
                        </section>
                    </div>
                    <div class="juntar">
                        <p>Unidades Curriculares</p>
                    </div>
                    <section> 
                        <div class="list-uc">
                            <table id="table-ucs">
                                <thead class="cabecalho">
                                    <tr class="infos">
                                        <th>Nome</th>
                                        <th>Horas-aula</th>
                                        <th>Áreas com proficiência</th>
                                        <th>Ações</th>
                                    </tr>
                                </thead>
                                <tbody>
                                </tbody>
                            </table>
                        </div>
                    </section>    
                    <div class="juntar">
                        <button class="botoes" id="voltar"><a href="/cursos"><svg width="25" height="24" viewBox="0 0 25 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M12.5 3C7.52944 3 3.5 7.02944 3.5 12C3.5 16.9706 7.52944 21 12.5 21C17.4706 21 21.5 16.9706 21.5 12C21.5 7.02944 17.4706 3 12.5 3ZM1.5 12C1.5 5.92487 6.42487 1 12.5 1C18.5751 1 23.5 5.92487 23.5 12C23.5 18.0751 18.5751 23 12.5 23C6.42487 23 1.5 18.0751 1.5 12Z" fill="white"/>
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M13.2071 7.29289C13.5976 7.68342 13.5976 8.31658 13.2071 8.70711L9.91421 12L13.2071 15.2929C13.5976 15.6834 13.5976 16.3166 13.2071 16.7071C12.8166 17.0976 12.1834 17.0976 11.7929 16.7071L7.79289 12.7071C7.40237 12.3166 7.40237 11.6834 7.79289 11.2929L11.7929 7.29289C12.1834 6.90237 12.8166 6.90237 13.2071 7.29289Z" fill="white"/>
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M7.5 12C7.5 11.4477 7.94772 11 8.5 11H16.5C17.0523 11 17.5 11.4477 17.5 12C17.5 12.5523 17.0523 13 16.5 13H8.5C7.94772 13 7.5 12.5523 7.5 12Z" fill="white"/>
                            </svg>Voltar</a>                     
                        </button>
                    </div>
                </form>
            </div>
    </div>
    <script>

    window.onload = function() {
        const cursoData = JSON.parse(localStorage.getItem('cursoData'));
        if (cursoData) {
            document.getElementById('id').value=cursoData[0]._id;
            document.getElementById('nome').value = cursoData[0].nome;
            document.getElementById('codigo').value = cursoData[0].codigo;
            document.getElementById('externo').checked = cursoData[0].externo;
            document.getElementById('carga').value = cursoData[0].carga;
            document.getElementById('habilitacao').value = cursoData[0].habilitacao;
            document.getElementById('area').value = cursoData[0].area;
            if (Array.isArray(cursoData[0].ucs)) {
                const tabela = document.querySelector("#table-ucs tbody");
                cursoData[0].ucs.forEach(uc => {
                    const registro = tabela.insertRow();
                    const registroNome = registro.insertCell();
                    const registroHoras = registro.insertCell();
                    const registroAreas = registro.insertCell();
                    const registroAcao = registro.insertCell();
                    registroNome.textContent = uc.nome;
                    registroHoras.textContent = uc.horasAula;
                    registroAreas.textContent = uc.areaProf;
                    registroAreas.classList.add("area-esquerda");
                    registroNome.classList.add("area-esquerda");
                });

            }
        } else {
            console.error('Dados do curso não encontrados no localStorage');
            alert('Dados não encontrados.');
        }
    }
    </script>
    <script src="./script_gerenciar_curso.js"></script>
</body>
</html>
