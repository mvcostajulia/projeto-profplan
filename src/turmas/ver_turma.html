<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profplan</title>
    <link rel="stylesheet" type="text/css" href="../shared/cores.css">
    <link rel="stylesheet" type="text/css" href="./style_gerenciar_turma.css"/>
    <link rel="stylesheet" type="text/css" href="../shared/padrao.css"/>
    <script src="../shared/header.js"></script>
    <script src="./header_config.js"></script>
</head>
<body>
    <div class="corpo">
        <p>As novas turmas são sempre provisórias e podem ser editadas ou excluídas por você até que haja a confirmação da equipe pedagógica. Após essa confirmação, a edição e exclusão estarão bloqueadas.</p>
        <div class="corpo-frame">
            <form id="editar-turma">
                <input type="hidden" id="id" name="id"/>
                <input type="hidden" id="codigo" name="codigo"/>
                <input type="hidden" id="status" name="status"/>
                <div class="juntar">
                    <section class="textos">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" name="nome" readonly placeholder="Digite aqui o nome da turma" />
                    </section>
                    <section class="checklist">
                        <div class="select-curso">
                            <label for="curso">Curso</label><br>
                            <select id="curso" name="curso" disabled>                                
                            </select>
                        </div>    
                    </section>
                    <section class="textos">
                        <label for="modulo">Módulo</label>
                        <input type="number" id="modulo" name="modulo" min="1" max="5" required readonly/>
                    </section>
                </div>
                <div class="juntar opcoes">
                    <section class="checklist">
                        <div class="select-origem">
                            <label for="origem">Origem</label><br>
                            <select id="origem" name="origem" disabled="disabled">                                
                                <option value="Balcão">Balcão</option>
                                <option value="In Company">In Company</option>
                                <option value="Gratuidade">Gratuidade</option>
                            </select>
                        </div>
                    </section>
                    <section class="checklist">    
                        <div class="select-origem">
                            <label for="turno">Turno</label><br>
                            <select id="turno" name="turno" disabled="disabled">                                
                                <option value="Matutino">Matutino</option>
                                <option value="Vespertino">Vespertino</option>
                                <option value="Noturno">Noturno</option>
                                <option value="Integral">Integral</option>
                                <option value="100% EAD">100% EAD</option>
                            </select>
                        </div>
                    </section>
                    <section class="datas">
                        <label for="data_inicio">Data de início</label>
                        <input type="date" id="data_inicio" name="data_inicio" readonly/>
                    </section>
                    <section class="datas">
                        <label for="data_fim">Data de fim</label>
                        <input type="date" id="data_fim" name="data_fim" readonly/>
                    </section>
                </div>
                <div class="juntar"> 
                    <section class="textos">
                        <label for="observacoes">Observações</label>
                        <textarea type="text" id="observacoes" name="observacoes" placeholder="Registre aqui suas observações" readonly></textarea> 
                    </section>
                </div>
                <div class="juntar">
                    <button id="voltar"><a href="/turmas"><svg width="25" height="24" viewBox="0 0 25 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M12.5 3C7.52944 3 3.5 7.02944 3.5 12C3.5 16.9706 7.52944 21 12.5 21C17.4706 21 21.5 16.9706 21.5 12C21.5 7.02944 17.4706 3 12.5 3ZM1.5 12C1.5 5.92487 6.42487 1 12.5 1C18.5751 1 23.5 5.92487 23.5 12C23.5 18.0751 18.5751 23 12.5 23C6.42487 23 1.5 18.0751 1.5 12Z" fill="white"/>
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M13.2071 7.29289C13.5976 7.68342 13.5976 8.31658 13.2071 8.70711L9.91421 12L13.2071 15.2929C13.5976 15.6834 13.5976 16.3166 13.2071 16.7071C12.8166 17.0976 12.1834 17.0976 11.7929 16.7071L7.79289 12.7071C7.40237 12.3166 7.40237 11.6834 7.79289 11.2929L11.7929 7.29289C12.1834 6.90237 12.8166 6.90237 13.2071 7.29289Z" fill="white"/>
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M7.5 12C7.5 11.4477 7.94772 11 8.5 11H16.5C17.0523 11 17.5 11.4477 17.5 12C17.5 12.5523 17.0523 13 16.5 13H8.5C7.94772 13 7.5 12.5523 7.5 12Z" fill="white"/>
                        </svg>Voltar</a>                     
                    </button>
                </div>
            </form>
        </div>
    </div>
    <script>

    window.onload = function() {
        const turmaData = JSON.parse(localStorage.getItem('turmaData'));
        function formatarData(data) {
            const dataObj = new Date(data);
            dataObj.setHours(dataObj.getHours() + 3);
            const ano = dataObj.getFullYear();
            const mes = (dataObj.getMonth() + 1).toString().padStart(2, '0');
            const dia = dataObj.getDate().toString().padStart(2, '0');
            return `${ano}-${mes}-${dia}`; 
        }
        if (turmaData) {
            document.getElementById('id').value=turmaData[0]._id;
            document.getElementById('nome').value = turmaData[0].nome;
            document.getElementById('codigo').value=turmaData[0].codigo;
            document.getElementById('curso').value=turmaData[0].curso;
            document.getElementById('modulo').value=turmaData[0].modulo;
            document.getElementById('origem').value = turmaData[0].origem;
            document.getElementById('turno').value = turmaData[0].turno;
            document.getElementById('data_inicio').value = formatarData(turmaData[0].data_inicio);
            document.getElementById('data_fim').value = formatarData(turmaData[0].data_fim);
            document.getElementById('observacoes').value = turmaData[0].observacoes;
            document.getElementById('status').value=turmaData[0].status;
        } else {
            console.error('Dados da turma não encontrados no localStorage');
            alert('Dados não encontrados.');
        }
    }
    </script>
    <script src="./script_gerenciar_turma.js"></script>
</body>
</html>
