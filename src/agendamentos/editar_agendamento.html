<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profplan</title>
    <link rel="stylesheet" type="text/css" href="../shared/cores.css">
    <link rel="stylesheet" type="text/css" href="./style_gerenciar_agendamento.css"/>
    <link rel="stylesheet" type="text/css" href="../shared/padrao.css"/>
    <script src="../shared/header.js"></script>
    <script src="./header_config.js"></script>
</head>
<body>
    <div id="notificacao" class="notificacao oculto"></div>
    <div class="corpo">
        <p></p>
        <div class="corpo-frame">
            <form id="editar-agendamento">
                <div class="juntar">
                    <input type="hidden" id="id" name="id"/>
                    <section class="checklist">
                        <div class="select-tecnico">
                            <label for="tecnicoEnsino">Técnico de ensino</label><br>
                            <select id="tecnicoEnsino" name="tecnicoEnsino">      
                            </select>
                        </div>    
                    </section>
                    <section class="checklist">
                        <div class="select-turma">
                            <label for="turma">Turma</label><br>
                            <select id="turma" name="turma" >              
                            </select>
                        </div>    
                    </section>
                </div>
                <div class="juntar">
                  <section class="textos">
                        <label for="modulo">Módulo</label>
                        <input type="number" id="modulo" name="modulo" min="1" max="5" required readonly />
                  </section>
                    <section class="checklist">
                        <div class="select-uc">
                            <label for="uc">Unidade Curricular</label><br>
                            <select id="uc" name="uc" >  
                            </select>
                        </div>    
                    </section>
                    <section class="textos">
                        <label for="cargaHorariaDisponivel">Carga Horária Disponível</label>
                        <input type="number" id="cargaHorariaDisponivel" name="cargaHorariaDisponivel" required readonly />
                  </section>
                </div>
                <div class="juntar calen">
                    <p>Agenda do técnico</p>
                </div>
                <div class="juntar calen" id="botoesCalendar">
                    <button type="button" class="botoes botoes-calendar" id="agenda-mensal">Mensal</button>
                    <button type="button" class="botoes botoes-calendar picked" id="agenda-semanal">Semanal</button>
                    <div id="controle-semanal">
                      <button title="Anterior" type="button" class="botoes botoes-arrow" id="prevWeek"><img src="../img/arrow-calendar-left.png" width="12px"></button>
                      <h2 id="weekLabel"></h2>
                      <button title="Próximo" type="button" class="botoes botoes-arrow" id="nextWeek"><img src="../img/arrow-calendar-right.png" width="12px"></button>
                    </div>
                    <div id="controle-mensal">
                      <label for="mesSelect">Mês:<br></label>
                      <select id="mesSelect">
                        <option value="0">Janeiro</option>
                        <option value="1">Fevereiro</option>
                        <option value="2">Março</option>
                        <option value="3">Abril</option>
                        <option value="4">Maio</option>
                        <option value="5">Junho</option>
                        <option value="6">Julho</option>
                        <option value="7">Agosto</option>
                        <option value="8">Setembro</option>
                        <option value="9">Outubro</option>
                        <option value="10">Novembro</option>
                        <option value="11">Dezembro</option>
                      </select>
                      <label for="anoSelect">Ano:<br></label>
                      <select id="anoSelect"></select>
                      <div id="legenda">
                        <div class="linha-legenda">
                          <div id="square-livre" class="square"></div>
                          <label>Livre</label>
                        </div>
                        <div class="linha-legenda">
                          <div id="square-parcial" class="square"></div>
                          <label>Agendamento parcial</label>
                        </div>
                      </div>
                    </div>
                </div>
                <section id="mensal">
                  <div class="mensal">
                    <table id="mes">
                      <thead class="dayline-mes">
                        <tr class="date-day-mes">
                          <th id="segunda-mes">Segunda</th>
                          <th id="terça-mes">Terça</th>
                          <th id="quarta-mes">Quarta</th>
                          <th id="quinta-mes">Quinta</th>
                          <th id="sexta-mes">Sexta</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr id="semana-um">
                          <td class="segunda-mes"></td>
                          <td class="terca-mes"></td>
                          <td class="quarta-mes"></td>
                          <td class="quinta-mes"></td>
                          <td class="sexta-mes"></td>
                        </tr>
                        <tr id="semana-dois">
                          <td class="segunda-mes"></td>
                          <td class="terca-mes"></td>
                          <td class="quarta-mes"></td>
                          <td class="quinta-mes"></td>
                          <td class="sexta-mes"></td>
                        </tr>
                        <tr id="semana-tres">
                          <td class="segunda-mes"></td>
                          <td class="terca-mes"></td>
                          <td class="quarta-mes"></td>
                          <td class="quinta-mes"></td>
                          <td class="sexta-mes"></td>
                        </tr>
                        <tr id="semana-quatro">
                          <td class="segunda-mes"></td>
                          <td class="terca-mes"></td>
                          <td class="quarta-mes"></td>
                          <td class="quinta-mes"></td>
                          <td class="sexta-mes"></td>
                        </tr>
                        <tr id="semana-cinco">
                          <td class="segunda-mes"></td>
                          <td class="terca-mes"></td>
                          <td class="quarta-mes"></td>
                          <td class="quinta-mes"></td>
                          <td class="sexta-mes"></td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </section>

                    <section>
                        <div class="calendar">
                            <table id="horario" class="calendario">
                                <thead class="dayline">

                                        <th id="sexta">Sexta</th>
                                    </tr>
                                    
                                </thead>
                                <tbody>
                                      <tr id="sete">

                                      </tr>
                                      <tr id="quinze">

                                        <td class="open quarta" horario="15:00"></td>
                                        <td class="open quinta" horario="15:00"></td>
                                        <td class="open sexta" horario="15:00"></td>
                                      </tr>
                                      <tr id="dezesseis">

                                        <td class="open segunda" horario="18:00"></td>
                                        <td class="open terca" horario="18:00"></td>
                                        <td class="open quarta" horario="18:00"></td>
                                        <td class="open quinta" horario="18:00"></td>
                                        <td class="open sexta" horario="18:00"></td>
                                      </tr>
                                      <tr id="dezenove">
                                        <td class="n">19:00</td>
                                        <td class="open segunda" horario="19:00"></td>

                                        <td class="open quinta" horario="19:00"></td>
                                        <td class="open sexta" horario="19:00"></td>
                                      </tr>

                                      </tr>

                                        <td class="open segunda" horario="21:00"></td>

                                      </tr>
                                </tbody>
                            </table>
                            
                        </div>
                    </section>
                </section>
                <br><br>
                <div class="juntar">

            </div>
        </div>

</html>
