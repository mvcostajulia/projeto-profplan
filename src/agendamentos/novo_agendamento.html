<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profplan</title>
    <link rel="stylesheet" type="text/css" href="../shared/cores.css">
    <link rel="stylesheet" type="text/css" href="./style_gerenciar_agendamento.css"/>    
    <link rel="stylesheet" type="text/css" href="../shared/padrao.css"/>
    <script src="../shared/header.js"></script>
    <script src="./header_config.js"></script>
</head>
<body>
    <div id="notificacao" class="notificacao oculto"></div>
    <div class="corpo">
        <p></p>
        <div class="corpo-frame">
            <form id="novo-agendamento">
                <div class="juntar">
                    <section class="checklist">
                        <div class="select-tecnico">
                            <label for="tecnicoEnsino">Técnico de ensino</label><br>
                            <select id="tecnicoEnsino" name="tecnicoEnsino"> 
                                <option value="selecione">Selecione</option>                               
                            </select>
                        </div>    
                    </section>
                    <section class="checklist">
                        <div class="select-turma">
                            <label for="turma">Turma</label><br>
                            <select id="turma" name="turma">   
                                <option value="selecione">Selecione</option>                                 
                            </select>
                        </div>    
                    </section>
                </div>
                <div class="juntar">
                  <section class="textos">
                        <label for="modulo">Módulo</label>
                        <input type="number" id="modulo" name="modulo" min="1" max="5" required readonly />
                  </section>
                  <section class="checklist">
                      <div class="select-uc">
                          <label for="uc">Unidade Curricular</label><br>
                          <select id="uc" name="uc">  
                              <option value="selecione">Selecione</option>                                  
                          </select>
                      </div>    
                  </section>
                  <section class="textos">
                        <label for="cargaHorariaDisponivel">Carga Horária Disponível</label>
                        <input type="number" id="cargaHorariaDisponivel" name="cargaHorariaDisponivel" required readonly />
                  </section>
                </div>
                <div class="juntar calen">
                    <p>Agenda do técnico</p>
                </div>
                <div class="juntar calen" id="botoesCalendar">
                    <button type="button" class="botoes botoes-calendar" id="agenda-mensal">Mensal</button>
                    <button type="button" class="botoes botoes-calendar picked" id="agenda-semanal">Semanal</button>
                    <div id="controle-semanal">
                      <button title="Anterior" type="button" class="botoes botoes-arrow" id="prevWeek"><img src="../img/arrow-calendar-left.png" width="12px"></button>
                      <h2 id="weekLabel"></h2>
                      <button title="Próxima" type="button" class="botoes botoes-arrow" id="nextWeek"><img src="../img/arrow-calendar-right.png" width="12px"></button>
                    </div>
                    <div id="controle-mensal">
                      <label for="mesSelect">Mês:<br></label>
                      <select id="mesSelect">
                        <option value="0">Janeiro</option>
                        <option value="1">Fevereiro</option>
                        <option value="2">Março</option>
                        <option value="3">Abril</option>
                        <option value="4">Maio</option>
                        <option value="5">Junho</option>
                        <option value="6">Julho</option>
                        <option value="7">Agosto</option>
                        <option value="8">Setembro</option>
                        <option value="9">Outubro</option>
                        <option value="10">Novembro</option>
                        <option value="11">Dezembro</option>
                      </select>
                      <label for="anoSelect">Ano:<br></label>
                      <select id="anoSelect"></select>
                      <div id="legenda">
                        <div class="linha-legenda">
                          <div id="square-livre" class="square"></div>
                          <label>Livre</label>
                        </div>
                        <div class="linha-legenda">
                          <div id="square-parcial" class="square"></div>
                          <label>Agendamento parcial</label>
                        </div>
                      </div>
                    </div>
                </div>
                <section id="mensal">
                  <div class="mensal">
                    <table id="mes">
                      <thead class="dayline-mes">
                        <tr class="date-day-mes">
                          <th id="segunda-mes">Segunda</th>
                          <th id="terça-mes">Terça</th>
                          <th id="quarta-mes">Quarta</th>
                          <th id="quinta-mes">Quinta</th>
                          <th id="sexta-mes">Sexta</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr id="semana-um">
                          <td class="segunda-mes"></td>
                          <td class="terca-mes"></td>
                          <td class="quarta-mes"></td>
                          <td class="quinta-mes"></td>
                          <td class="sexta-mes"></td>
                        </tr>
                        <tr id="semana-dois">
                          <td class="segunda-mes"></td>
                          <td class="terca-mes"></td>
                          <td class="quarta-mes"></td>
                          <td class="quinta-mes"></td>
                          <td class="sexta-mes"></td>
                        </tr>
                        <tr id="semana-tres">
                          <td class="segunda-mes"></td>
                          <td class="terca-mes"></td>
                          <td class="quarta-mes"></td>
                          <td class="quinta-mes"></td>
                          <td class="sexta-mes"></td>
                        </tr>
                        <tr id="semana-quatro">
                          <td class="segunda-mes"></td>
                          <td class="terca-mes"></td>
                          <td class="quarta-mes"></td>
                          <td class="quinta-mes"></td>
                          <td class="sexta-mes"></td>
                        </tr>
                        <tr id="semana-cinco">
                          <td class="segunda-mes"></td>
                          <td class="terca-mes"></td>
                          <td class="quarta-mes"></td>
                          <td class="quinta-mes"></td>
                          <td class="sexta-mes"></td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </section>
                <section id="semanal">
                    <section>
                        <div class="calendar">
                            <table id="horario" class="calendario">
                                <thead class="dayline">
                                    <tr class="date-day">
                                        <th>Horários</th>
                                        <th id="segunda">Segunda</th>
                                        <th id="terca">Terça</th>
                                        <th id="quarta">Quarta</th>
                                        <th id="quinta">Quinta</th>
                                        <th id="sexta">Sexta</th>
                                    </tr>
                                </thead>
                                <tbody>
                                      <tr id="sete">
                                        <td class="n">07:00</td>
                                        <td class="open segunda" horario="07:00"></td>
                                        <td class="open terca" horario="07:00"></td>
                                        <td class="open quarta" horario="07:00"></td>
                                        <td class="open quinta" horario="07:00"></td>
                                        <td class="open sexta" horario="07:00"></td>
                                      </tr>
                                      <tr id="oito">
                                        <td class="n">08:00</td>
                                        <td class="open segunda" horario="08:00"></td>
                                        <td class="open terca" horario="08:00"></td>
                                        <td class="open quarta" horario="08:00"></td>
                                        <td class="open quinta" horario="08:00"></td>
                                        <td class="open sexta" horario="08:00"></td>
                                      </tr>
                                      <tr id="nove">
                                        <td class="n">09:00</td>
                                        <td class="open segunda" horario="09:00"></td>
                                        <td class="open terca" horario="09:00"></td>
                                        <td class="open quarta" horario="09:00"></td>
                                        <td class="open quinta" horario="09:00"></td>
                                        <td class="open sexta" horario="09:00"></td>
                                      </tr>
                                      <tr id="dez">
                                        <td class="n">10:00</td>
                                        <td class="open segunda" horario="10:00"></td>
                                        <td class="open terca" horario="10:00"></td>
                                        <td class="open quarta" horario="10:00"></td>
                                        <td class="open quinta" horario="10:00"></td>
                                        <td class="open sexta" horario="10:00"></td>
                                      </tr>
                                      <tr id="onze">
                                        <td class="n">11:00</td>
                                        <td class="open segunda" horario="11:00"></td>
                                        <td class="open terca" horario="11:00"></td>
                                        <td class="open quarta" horario="11:00"></td>
                                        <td class="open quinta" horario="11:00"></td>
                                        <td class="open sexta" horario="11:00"></td>
                                      </tr>
                                      <tr id="doze">
                                        <td class="n">12:00</td>
                                        <td class="open segunda" horario="12:00"></td>
                                        <td class="open terca" horario="12:00"></td>
                                        <td class="open quarta" horario="12:00"></td>
                                        <td class="open quinta" horario="12:00"></td>
                                        <td class="open sexta" horario="12:00"></td>
                                      </tr>
                                      <tr id="treze">
                                        <td class="n">13:00</td>
                                        <td class="open segunda" horario="13:00"></td>
                                        <td class="open terca" horario="13:00"></td>
                                        <td class="open quarta" horario="13:00"></td>
                                        <td class="open quinta" horario="13:00"></td>
                                        <td class="open sexta" horario="13:00"></td>
                                      </tr>
                                      <tr id="quatorze">
                                        <td class="n">14:00</td>
                                        <td class="open segunda" horario="14:00"></td>
                                        <td class="open terca" horario="14:00"></td>
                                        <td class="open quarta" horario="14:00"></td>
                                        <td class="open quinta" horario="14:00"></td>
                                        <td class="open sexta" horario="14:00"></td>
                                      </tr>
                                      <tr id="quinze">
                                        <td class="n">15:00</td>
                                        <td class="open segunda" horario="15:00"></td>
                                        <td class="open terca" horario="15:00"></td>
                                        <td class="open quarta" horario="15:00"></td>
                                        <td class="open quinta" horario="15:00"></td>
                                        <td class="open sexta" horario="15:00"></td>
                                      </tr>
                                      <tr id="dezesseis">
                                        <td class="n">16:00</td>
                                        <td class="open segunda" horario="16:00"></td>
                                        <td class="open terca" horario="16:00"></td>
                                        <td class="open quarta" horario="16:00"></td>
                                        <td class="open quinta" horario="16:00"></td>
                                        <td class="open sexta" horario="16:00"></td>
                                      </tr>
                                      <tr id="dezessete">
                                        <td class="n">17:00</td>
                                        <td class="open segunda" horario="17:00"></td>
                                        <td class="open terca" horario="17:00"></td>
                                        <td class="open quarta" horario="17:00"></td>
                                        <td class="open quinta" horario="17:00"></td>
                                        <td class="open sexta" horario="17:00"></td>
                                      </tr>
                                      <tr id="dezoito">
                                        <td class="n">18:00</td>
                                        <td class="open segunda" horario="18:00"></td>
                                        <td class="open terca" horario="18:00"></td>
                                        <td class="open quarta" horario="18:00"></td>
                                        <td class="open quinta" horario="18:00"></td>
                                        <td class="open sexta" horario="18:00"></td>
                                      </tr>
                                      <tr id="dezenove">
                                        <td class="n">19:00</td>
                                        <td class="open segunda" horario="19:00"></td>
                                        <td class="open terca" horario="19:00"></td>
                                        <td class="open quarta" horario="19:00"></td>
                                        <td class="open quinta" horario="19:00"></td>
                                        <td class="open sexta" horario="19:00"></td>
                                      </tr>
                                      <tr id="vinte">
                                        <td class="n">20:00</td>
                                        <td class="open segunda" horario="20:00"></td>
                                        <td class="open terca" horario="20:00"></td>
                                        <td class="open quarta" horario="20:00"></td>
                                        <td class="open quinta" horario="20:00"></td>
                                        <td class="open sexta" horario="20:00"></td>
                                      </tr>
                                      <tr id="vinteum">
                                        <td class="n">21:00</td>
                                        <td class="open segunda" horario="21:00"></td>
                                        <td class="open terca" horario="21:00"></td>
                                        <td class="open quarta" horario="21:00"></td>
                                        <td class="open quinta" horario="21:00"></td>
                                        <td class="open sexta" horario="21:00"></td>
                                      </tr>
                                      <tr id="vintedois">
                                        <td class="n">22:00</td>
                                        <td class="open segunda" horario="22:00"></td>
                                        <td class="open terca" horario="22:00"></td>
                                        <td class="open quarta" horario="22:00"></td>
                                        <td class="open quinta" horario="22:00"></td>
                                        <td class="open sexta" horario="22:00"></td>
                                      </tr>
                                      <tr id="vintetres">
                                        <td class="n">23:00</td>
                                        <td class="open segunda" horario="23:00"></td>
                                        <td class="open terca" horario="23:00"></td>
                                        <td class="open quarta" horario="23:00"></td>
                                        <td class="open quinta" horario="23:00"></td>
                                        <td class="open sexta" horario="23:00"></td>
                                      </tr>
                                </tbody>
                            </table>
                        </div>
                    </section>
                </section>
                <br><br>
                <div class="juntar">
                <button class="botoes" id="voltar"><a href="/agendamentos"><svg width="25" height="24" viewBox="0 0 25 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M12.5 3C7.52944 3 3.5 7.02944 3.5 12C3.5 16.9706 7.52944 21 12.5 21C17.4706 21 21.5 16.9706 21.5 12C21.5 7.02944 17.4706 3 12.5 3ZM1.5 12C1.5 5.92487 6.42487 1 12.5 1C18.5751 1 23.5 5.92487 23.5 12C23.5 18.0751 18.5751 23 12.5 23C6.42487 23 1.5 18.0751 1.5 12Z" fill="white"/>
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M13.2071 7.29289C13.5976 7.68342 13.5976 8.31658 13.2071 8.70711L9.91421 12L13.2071 15.2929C13.5976 15.6834 13.5976 16.3166 13.2071 16.7071C12.8166 17.0976 12.1834 17.0976 11.7929 16.7071L7.79289 12.7071C7.40237 12.3166 7.40237 11.6834 7.79289 11.2929L11.7929 7.29289C12.1834 6.90237 12.8166 6.90237 13.2071 7.29289Z" fill="white"/>
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M7.5 12C7.5 11.4477 7.94772 11 8.5 11H16.5C17.0523 11 17.5 11.4477 17.5 12C17.5 12.5523 17.0523 13 16.5 13H8.5C7.94772 13 7.5 12.5523 7.5 12Z" fill="white"/>
                        </svg>Voltar</a>                     
                    </button>
                    <button class="botoes" id="salvar" type="submit">Salvar Agendamento
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M16.6677 9.2323C16.9536 9.532 16.9424 10.0067 16.6427 10.2927L11.1396 15.5427C10.8496 15.8193 10.3934 15.8191 10.1037 15.5422L7.35684 12.9172C7.05738 12.631 7.0466 12.1563 7.33278 11.8568C7.61895 11.5574 8.0937 11.5466 8.39317 11.8328L10.6223 13.963L15.6073 9.20734C15.907 8.92142 16.3817 8.93259 16.6677 9.2323Z" fill="currentColor"/>
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M12 3.75C7.44365 3.75 3.75 7.44365 3.75 12C3.75 16.5563 7.44365 20.25 12 20.25C16.5563 20.25 20.25 16.5563 20.25 12C20.25 7.44365 16.5563 3.75 12 3.75ZM2.25 12C2.25 6.61522 6.61522 2.25 12 2.25C17.3848 2.25 21.75 6.61522 21.75 12C21.75 17.3848 17.3848 21.75 12 21.75C6.61522 21.75 2.25 17.3848 2.25 12Z" fill="currentColor"/>
                        </svg>                 
                    </button>
                </div>
            </form>
        </div>
    </div>
    <div id="janelaAgendamento" hidden></div>
    <script>
    document.addEventListener('DOMContentLoaded',  () => {
      document.dispatchEvent(new Event('novoTec'));
    });
    </script>
    <script src="../shared/registroLogs.js"></script>
    <script src="./script_novo_agendamento.js"></script>
    <script src="./script_agenda_tecnico.js"></script>
</body>
</html>
